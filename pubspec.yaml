name: absensi_kelas
description: "A new Flutter project."
publish_to: 'none'

version: 2.1.1+2

environment:
  sdk: ^3.10.8

dependencies:
  cupertino_icons: ^1.0.8
  drift: ^2.32.1
  excel: ^4.0.6
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  open_filex: ^4.7.0
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^13.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Thin.ttf
          weight: 100

        - asset: assets/fonts/poppins/Poppins-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300

        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400

        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500

        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700

        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/poppins/Poppins-Black.ttf
          weight: 900

    - family: PragatiNarrow
      fonts:
        - asset: assets/fonts/pragati_narrow/PragatiNarrow-Regular.ttf
          weight: 400

        - asset: assets/fonts/pragati_narrow/PragatiNarrow-Bold.ttf
          weight: 700

flutter_launcher_icons :
  android : true
  ios: true
  image_path: assets/app_icon/PresentApp.png